# Base Tractus-X / EDC configuration (platform standard)
#
# This file should contain ALL "standard" properties that are constant across tenants in your platform.
# The tenant-service will append per-tenant overrides at provisioning time (ports, BPN/DID, DB, URLs).
#
# IMPORTANT:
# - Do NOT hardcode secrets (client secrets, DB passwords, keystore/truststore passwords) here.
# - Prefer secret aliases (e.g., "...secret.alias=client-secret") and mount secrets separately.
#
# Tenant-service appends (generated per tenant):
# - web.http.* ports/paths
# - tractusx.edc.participant.bpn
# - edc.iam.issuer.id / trusted issuer ids
# - edc.dsp.callback.address
# - edc.serviceexchange.provider.public.url
# - edc.datasource.default.* (url/user/password)  [password should become secret-based later]


# ---------- JSON-LD ----------
edc.jsonld.https.enabled=true
edc.jsonld.https.verification=false
edc.jsonld.http.enabled=true
edc.jsonld.cache.enabled=true
edc.jsonld.context.https.fallback=http


# ---------- OAuth / Keycloak (platform standard) ----------
# Replace issuer/jwks/audience with your platform realm settings.
edc.oauth.provider.jwks.url=https://devsoft.ceptra.org/realms/ceptra/protocol/openid-connect/certs
edc.oauth.provider.issuer=https://devsoft.ceptra.org/realms/ceptra
edc.oauth.provider.audience=account

# Dev-only: disable SSL verification (remove in prod)
edc.oauth.ssl.verification.enabled=false
edc.http.ssl.verification.enabled=false

# User management - Keycloak (platform standard)
edc.user.management.keycloak.server.url=https://devsoft.ceptra.org
edc.user.management.keycloak.realm=ceptra
edc.user.management.keycloak.client.id=ceptra-ui
# Do NOT put real secrets here; keep alias/reference only.
edc.user.management.keycloak.client.secret=CHANGE_ME_USE_SECRET_STORE


# ---------- Vault ----------
edc.vault=memory-vault
# Secret alias list is platform-managed; tenant-service should not embed real secrets.
tx.edc.vault.secrets=key1:secret1;private-key:dev-key;public-key:dev-key;client-secret:CHANGE_ME;auth-code-id:test123;auth-key:test456;ch-trust-anchor-password:changeit
edc.transfer.proxy.token.signer.privatekey.alias=private-key
edc.transfer.proxy.token.verifier.publickey.alias=public-key


# ---------- BDRS / Credential Service (platform standard) ----------
# Use host.docker.internal for local docker-compose dev
tx.edc.iam.iatp.bdrs.server.url=http://host.docker.internal:13000
tx.iam.iatp.credentialservice.url=http://host.docker.internal:14000
tx.edc.iam.iatp.credentialservice.url=http://host.docker.internal:14000
tx.edc.iam.iatp.bdrs.cache.validity=5


# ---------- Truststore paths (container paths!) ----------
dynamic.truststore.reload.enabled=true
dynamic.truststore.poll.interval.seconds=5
dynamic.truststore.password=changeit
dynamic.truststore.type=PKCS12
dynamic.truststore.path=/app/external-truststore.p12

edc.truststore.path=/app/external-truststore.p12
edc.truststore.type=PKCS12
edc.truststore.password=

edc.certificate.validator.clearing.house.trust.anchor.path=/app/external-truststore.p12
edc.certificate.validator.clearing.house.trust.anchor.password.alias=ch-trust-anchor-password
edc.certificate.validator.clearing.house.trust.anchor.type=PKCS12


# ---------- Clearing house / validation ----------
edc.clearinghouse.participant.validation.enabled=false
edc.clearinghouse.event.logging.enabled=true
edc.clearinghouse.receipt.verification.enabled=true
edc.clearinghouse.trust.anchor.enabled=false

edc.gaiax.registry.base.url=https://registry.lab.gaia-x.eu/development
edc.gaiax.compliance.base.url=https://compliance.lab.gaia-x.eu/development


# ---------- SQL bootstrap (Tractus-X defaults) ----------
edc.sql.schema.autocreate=false
edc.sql.schema.bootstrap.enabled=true
edc.controlplane.assetindex.sql.enabled=true
edc.controlplane.contractdefinition.sql.enabled=true


# ---------- DSP ----------
edc.dsp.http.api.enabled=true
edc.dsp.http.api.path=/protocol
edc.dsp.catalog.enabled=true


# ---------- STS OAuth ----------
edc.iam.sts.oauth.token.url=https://devsoft.ceptra.org/realms/ceptra/protocol/openid-connect/token
edc.iam.sts.oauth.client.id=ceptra-ui
# Keep alias only; actual secret value must come from secret store.
edc.iam.sts.oauth.client.secret.alias=client-secret


