server:
  port: 8081

spring:
  application:
    name: tenant-service

  # Virtual Threads
  threads:
    virtual:
      enabled: true

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5432/audit_log
    username: user
    password: me
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    url: jdbc:postgresql://localhost:5432/audit_log
    user: user
    password: me
    baseline-on-migrate: true

#  # Redis
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      username: default
#      password: redis123
#      timeout: 2000ms

  # OAuth2 Resource Server (Keycloak)
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak issuer URI - Spring Boot will auto-configure JWT validation
#          issuer-uri: http://localhost:8080/realms/connector
          issuer-uri: https://devsoft.ceptra.org/realms/ceptra
          # Alternative: Use JWKS URI directly
          # jwk-set-uri: http://localhost:8080/realms/trading-platform/protocol/openid-connect/certs

# Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      marketData:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 10s
        failureRateThreshold: 50

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.angellos: DEBUG
    com.angellos.trading.service.interceptor: INFO
    org.springframework.kafka: INFO
    org.apache.kafka: INFO
    org.springframework.kafka.listener: INFO
    org.springframework.web.socket: DEBUG
    org.springframework.messaging: DEBUG

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    oauth:
      client-id: ceptra-ui
      use-pkce-with-authorization-code-grant: true
      additional-query-string-params:
        grant_type: password
      scopes: openid,profile,email